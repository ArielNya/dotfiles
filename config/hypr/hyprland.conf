# ═══════════════════════════════════════════════════════════════
#  🔥 Meru Cozy — Hyprland Config
#  Warm amber, deep crimson, night-sky blue
# ═══════════════════════════════════════════════════════════════

# ── Source ───────────────────────────────────────────────────
# source = ~/.config/hypr/extra.conf  # for personal overrides

# ── Monitor ──────────────────────────────────────────────────
monitor = eDP-1, 1920x1080@60, 0x0, 1
# monitor = , preferred, auto, 1  # fallback for external monitors

# ── Autostart ────────────────────────────────────────────────
exec-once = hyprpaper
exec-once = waybar
exec-once = dunst
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = hypridle
exec-once = nm-applet --indicator

# ── Environment Variables ────────────────────────────────────
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# ── General ──────────────────────────────────────────────────
general {
    gaps_in = 5
    gaps_out = 8
    border_size = 2

    col.active_border = rgba(c56d3aee) rgba(843727ee) 45deg
    col.inactive_border = rgba(2b151866)

    layout = dwindle
    allow_tearing = false
}

# ── Decoration ───────────────────────────────────────────────
decoration {
    rounding = 10

    blur {
        enabled = true
        size = 6
        passes = 3
        noise = 0.02
        contrast = 1.0
        brightness = 0.9
        vibrancy = 0.2
        vibrancy_darkness = 0.5
        new_optimizations = true
        xray = false
    }

    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(1a0e1088)
        color_inactive = rgba(1a0e1044)
    }

    active_opacity = 1.0
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0

    dim_inactive = true
    dim_strength = 0.08
}

# ── Animations ───────────────────────────────────────────────
animations {
    enabled = true

    # Bezier curves
    bezier = meruSmooth, 0.05, 0.9, 0.1, 1.05
    bezier = meruSnap, 0.16, 1, 0.3, 1
    bezier = meruBounce, 0.68, -0.55, 0.265, 1.55
    bezier = meruSlow, 0, 0.85, 0.15, 1

    # Animations
    animation = windows, 1, 5, meruSmooth, slide
    animation = windowsIn, 1, 5, meruSmooth, slide
    animation = windowsOut, 1, 4, meruSnap, slide
    animation = windowsMove, 1, 4, meruSnap
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 5, meruSmooth
    animation = fadeIn, 1, 5, meruSmooth
    animation = fadeOut, 1, 3, meruSnap
    animation = workspaces, 1, 5, meruSmooth, slide
    animation = specialWorkspace, 1, 4, meruBounce, slidevert
}

# ── Input ────────────────────────────────────────────────────
input {
    kb_layout = br
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = false
        disable_while_typing = true
    }
}

gestures {
    gesture = 3, horizontal, workspace
}

# ── Layouts ──────────────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

master {
    new_status = master
}

# ── Misc ─────────────────────────────────────────────────────
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    animate_manual_resizes = true
    enable_swallow = true
    swallow_regex = ^(kitty)$
}

# ── Window Rules ─────────────────────────────────────────────
# Floating windows
windowrule = match:class ^(pavucontrol)$, float 1
windowrule = match:class ^(nm-connection-editor)$, float 1
windowrule = match:class ^(org.kde.polkit-kde-authentication-agent-1)$, float 1
windowrule = match:class ^(nwg-look)$, float 1
windowrule = match:class ^(blueman-manager)$, float 1
windowrule = match:title ^(Picture-in-Picture)$, float 1
windowrule = match:title ^(Open File)$, float 1
windowrule = match:title ^(Save As)$, float 1

# Opacity rules
windowrule = match:class ^(kitty)$, opacity 0.88 0.82
windowrule = match:class ^(Code)$, opacity 0.92 0.88
windowrule = match:class ^(code-oss)$, opacity 0.92 0.88
windowrule = match:class ^(discord)$, opacity 0.95 0.90
windowrule = match:class ^(vesktop)$, opacity 0.95 0.90

# Size constraints for floating
windowrule = match:class ^(pavucontrol)$, size 800 600, center 1

# ── Keybinds ─────────────────────────────────────────────────
$mod = SUPER

# Core
bind = $mod, Return, exec, kitty
bind = $mod, Q, killactive,
bind = $mod SHIFT, Q, exit,
bind = $mod, E, exec, nautilus
bind = $mod, V, togglefloating,
bind = $mod, F, fullscreen, 0
bind = $mod SHIFT, F, fullscreen, 1  # maximize
bind = $mod, P, layoutmsg, pseudo
bind = $mod, T, layoutmsg, togglesplit

# App Launcher
bind = $mod, Space, exec, rofi -show drun -theme ~/.config/rofi/meru-cozy.rasi
bind = $mod, R, exec, rofi -show run -theme ~/.config/rofi/meru-cozy.rasi
bind = $mod SHIFT, V, exec, cliphist list | rofi -dmenu -theme ~/.config/rofi/meru-cozy.rasi | cliphist decode | wl-copy

# Screenshot
bind = , Print, exec, grim -g "$(slurp -d)" - | wl-copy
bind = SHIFT, Print, exec, grim - | wl-copy
bind = $mod, Print, exec, grim -g "$(slurp -d)" ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png

# Lock
bind = $mod CTRL, L, exec, hyprlock

# Focus (vim-style + arrows)
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r

# Move windows
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d
bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, j, movewindow, d
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, l, movewindow, r

# Resize
binde = $mod CTRL, left, resizeactive, -30 0
binde = $mod CTRL, right, resizeactive, 30 0
binde = $mod CTRL, up, resizeactive, 0 -30
binde = $mod CTRL, down, resizeactive, 0 30

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Special workspace (scratchpad)
bind = $mod, S, togglespecialworkspace, magic
bind = $mod SHIFT, S, movetoworkspace, special:magic

# Scroll through workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Move/resize with mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Media keys
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 5%-
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# Tab through recent workspaces
bind = ALT, Tab, workspace, previous
