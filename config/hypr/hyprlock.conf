# ═══════════════════════════════════════════════════════════════
#  🔥 Meru Cozy — Hyprlock Config
# ═══════════════════════════════════════════════════════════════

general {
    grace = 3
    hide_cursor = true
    no_fade_in = false
    no_fade_out = false
}

background {
    monitor =
    path = ~/.config/hypr/wallpaper.png
    blur_passes = 3
    blur_size = 6
    noise = 0.02
    contrast = 0.85
    brightness = 0.5
    vibrancy = 0.15
    vibrancy_darkness = 0.3
}

# ── Clock ────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(232, 220, 208, 0.95)
    font_size = 90
    font_family = JetBrainsMono Nerd Font
    position = 0, 200
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(26, 14, 16, 0.8)
    shadow_boost = 1.5
}

# ── Date ─────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color = rgba(197, 109, 58, 0.9)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, 110
    halign = center
    valign = center
    shadow_passes = 1
    shadow_size = 2
    shadow_color = rgba(26, 14, 16, 0.6)
}

# ── Greeting ─────────────────────────────────────────────────
label {
    monitor =
    text = hi alice~ 🐱
    color = rgba(168, 144, 128, 0.8)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, -40
    halign = center
    valign = center
}

# ── Password Input ───────────────────────────────────────────
input-field {
    monitor =
    size = 280, 48
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(197, 109, 58, 0.6)
    inner_color = rgba(43, 21, 24, 0.85)
    font_color = rgba(232, 220, 208, 0.95)
    fade_on_empty = true
    fade_timeout = 2000
    placeholder_text = <i>✦ password ✦</i>
    hide_input = false
    rounding = 10
    check_color = rgba(11, 89, 108, 0.8)
    fail_color = rgba(197, 58, 58, 0.8)
    fail_text = <i>nuh uh~ 🐱</i>
    fail_transition = 300
    capslock_color = rgba(212, 168, 50, 0.8)
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false
    position = 0, -120
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(26, 14, 16, 0.5)
}
