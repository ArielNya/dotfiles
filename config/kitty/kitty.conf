# ═══════════════════════════════════════════════════════════════
#  🔥 Meru Cozy — Kitty Terminal Config
#  Warm cozy terminal with Meru palette
# ═══════════════════════════════════════════════════════════════

# ── Display ──────────────────────────────────────────────────
linux_display_server wayland
wayland_titlebar_color system
hide_window_decorations yes

# ── Window ───────────────────────────────────────────────────
background_opacity 0.85
dynamic_background_opacity yes
confirm_os_window_close 0
remember_window_size no
initial_window_width 96c
initial_window_height 28c
window_padding_width 10 14

# ── Font ─────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# ── Cursor ───────────────────────────────────────────────────
cursor_shape beam
cursor_beam_thickness 1.5
cursor_blink_interval 0.5

# ── Scrollback ───────────────────────────────────────────────
scrollback_lines 10000

# ── Bell ─────────────────────────────────────────────────────
enable_audio_bell no
visual_bell_duration 0

# ── URL ──────────────────────────────────────────────────────
url_color #c56d3a
url_style curly

# ── Tab Bar ──────────────────────────────────────────────────
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_min_tabs 2
active_tab_foreground   #e8dcd0
active_tab_background   #4a2428
active_tab_font_style   bold
inactive_tab_foreground #a89080
inactive_tab_background #2b1518
inactive_tab_font_style normal
tab_bar_background      #1a0e10

# ═══════════════════════════════════════════════════════════════
